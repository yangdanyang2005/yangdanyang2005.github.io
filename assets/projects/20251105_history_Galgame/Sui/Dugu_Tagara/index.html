<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宫中二圣</title>
    <style>
        /* --- 1. 全局与字体设置 --- */
        @font-face {
            font-family: 'AncientFont';
            src: local('KaiTi'), local('STKaiti'), local('SimSun'), serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'AncientFont', serif;
            overflow: hidden;
        }

        /* --- 2. 游戏舞台 --- */
        #game-stage {
            width: 960px;
            height: 640px;
            background-color: #000;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px double #5c4033;
            overflow: hidden;
        }

        /* --- 3. 背景层 --- */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 440px; 
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
            border-bottom: 2px solid #3a2a2a;
        }

        .bg-layer.active {
            opacity: 1;
            z-index: 2;
        }

        /* --- 4. 立绘层 --- */
        #character-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 440px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: scale(0.95);
            transition: opacity 0.3s;
            z-index: 5;
            pointer-events: none;
        }

        /* --- 5. UI 容器 --- */
        #ui-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 10;
            display: none;
            overflow: visible;
        }

        /* --- 6. 头像组件 --- */
        #avatar-box {
            position: absolute;
            /* 让头像稍稍浮起，看起来更生动 */
            bottom: 50px; 
            left: 10px;
            width: 220px; 
            height: 220px; 
            z-index: 100; 
            overflow: visible;
            pointer-events: none;
        }

        .avatar-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom center;
            opacity: 0; 
            transition: opacity 0.5s ease-in-out; 
            filter: drop-shadow(5px 5px 8px rgba(0,0,0,0.6));
        }

        .avatar-layer.active {
            opacity: 1; 
        }

        /* --- 7. 对话框组件 --- */
        #text-box {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%; 
            height: 100%;
            background: linear-gradient(to bottom, #1f1a1a, #110e0e);
            border-top: 4px solid #8b5a2b;
            
            padding: 35px 40px 35px 240px; 
            
            box-sizing: border-box;
            color: #e0d0b0;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10; 

            /* opacity 过渡实现淡入淡出效果 */
            transition: opacity 0.5s ease-in-out;
            opacity: 1; 
        }

        #name-tag {
            font-size: 28px;
            font-weight: bold;
            color: #ffb366;
            text-shadow: 2px 2px 4px #000;
            margin-bottom: 15px;
            letter-spacing: 2px;
            display: inline-block;
            border-bottom: 2px solid #5c2020;
            padding-bottom: 4px;
        }

        #dialog-text {
            font-size: 22px;
            line-height: 1.6;
            letter-spacing: 1.5px;
            font-family: 'AncientFont', serif;
            text-shadow: 1px 1px 2px #000;
        }

        #next-indicator {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 16px;
            color: #8b5a2b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- 8. 开始遮罩层 --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: opacity 1s;
        }
        
        #start-title {
            font-size: 48px;
            margin-bottom: 20px;
            color: #a58f6e;
            letter-spacing: 10px;
        }

        #start-hint {
            font-size: 18px;
            color: #666;
            animation: pulse 2s infinite;
        }

    </style>
</head>
<body>

    <div id="game-stage">
        <div id="bg-layer-1" class="bg-layer active"></div>
        <div id="bg-layer-2" class="bg-layer"></div>

        <div id="character-layer"></div>

        <div id="ui-container">
            <div id="avatar-box">
                <img id="avatar-1" class="avatar-layer" src="" alt="">
                <img id="avatar-2" class="avatar-layer" src="" alt="">
            </div>
            
            <div id="text-box" onclick="nextStep()">
                <div id="name-tag"></div>
                <div id="dialog-text"></div>
                <div id="next-indicator">▼</div>
            </div>
        </div>

        <div id="start-screen" onclick="initGame()">
            <div id="start-title">历史剧场</div>
            <div id="start-hint">◆ 点击屏幕开启篇章 ◆</div>
        </div>
    </div>

    <audio id="bgm-player" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 变量声明 ---
        let scriptData = [];
        let currentIndex = -1;
        let typeWriterTimer = null;
        
        let currentBgUrl = "";
        let activeBgIndex = 1;

        let currentAvatarUrl = "";
        let activeAvatarIndex = 1;

        // DOM 元素
        const bgLayer1 = document.getElementById('bg-layer-1');
        const bgLayer2 = document.getElementById('bg-layer-2');
        
        const avatar1 = document.getElementById('avatar-1');
        const avatar2 = document.getElementById('avatar-2');

        const charEl = document.getElementById('character-layer');
        
        // 获取 text-box 本身，以便控制它的透明度
        const textBoxEl = document.getElementById('text-box'); 
        const nameEl = document.getElementById('name-tag');
        const textEl = document.getElementById('dialog-text');
        
        const uiContainer = document.getElementById('ui-container');
        const startScreen = document.getElementById('start-screen');
        const audioPlayer = document.getElementById('bgm-player');

        // --- 1. 初始化游戏 ---
        function initGame() {
            audioPlayer.volume = 0.5;
            audioPlayer.play().catch(e => console.log("音频播放需交互:", e));

            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'block';
            }, 1000);

            loadScript();
        }

        // --- 2. 加载 CSV ---
        function loadScript() {
            fetch('script.csv')
                .then(res => {
                    if (!res.ok) throw new Error("CSV读取失败");
                    return res.text();
                })
                .then(text => {
                    scriptData = parseCSV(text);
                    nextStep();
                })
                .catch(err => {
                    console.error(err);
                    textEl.innerText = "错误：请确保 script.csv 存在。";
                });
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.split(',');
                result.push({
                    bg: parts[0] || "",
                    char: parts[1] || "",
                    avatar: parts[2] || "",
                    name: parts[3] || "",
                    text: parts.slice(4).join(',') || ""
                });
            }
            return result;
        }

        // --- 3. 推进剧情 ---
        function nextStep() {
            if (scriptData.length === 0) return;

            currentIndex++;
            if (currentIndex >= scriptData.length) {
                if(confirm("剧情结束，是否重头开始？")) {
                    currentIndex = 0;
                } else {
                    return;
                }
            }
            renderScene(scriptData[currentIndex]);
        }

        // --- 4. 渲染场景 ---
        function renderScene(scene) {
            const newBg = scene.bg ? scene.bg.trim() : "";
            const newAvatar = scene.avatar ? scene.avatar.trim() : "";
            // 预处理文字内容，去除两端空格
            const newText = scene.text ? scene.text.trim() : "";

            // 4.1 背景切换检测
            if (newBg && newBg !== currentBgUrl) {
                switchBackground(newBg);
                currentBgUrl = newBg;
            }

            // 4.2 头像切换检测
            if (newAvatar !== currentAvatarUrl) {
                switchAvatar(newAvatar);
                currentAvatarUrl = newAvatar;
            }

            // 4.3 立绘更新
            if (scene.char && scene.char.trim() !== "") {
                charEl.style.backgroundImage = `url('${scene.char.trim()}')`;
                charEl.style.opacity = 1;
            } else {
                charEl.style.opacity = 0;
            }

            // 4.4 文本框隐显控制
            if (newText === "") {
                // 如果没有文字，文本框淡出（变透明）
                textBoxEl.style.opacity = "0";
                // 清空内容防止残留
                nameEl.innerText = "";
                textEl.innerText = "";
                // 注意：这里没有设置 display:none，所以 opacity:0 的区域依然可以被点击
                // 这样玩家点击屏幕底部时，依然可以触发 nextStep() 进入下一步
            } else {
                // 如果有文字，文本框淡入
                textBoxEl.style.opacity = "1";
                nameEl.innerText = scene.name;
                runTypewriter(newText);
            }
        }

        function switchBackground(url) {
            const activeLayer = activeBgIndex === 1 ? bgLayer1 : bgLayer2;
            const nextLayer = activeBgIndex === 1 ? bgLayer2 : bgLayer1;

            nextLayer.style.backgroundImage = `url('${url}')`;
            nextLayer.classList.add('active');
            activeLayer.classList.remove('active');

            activeBgIndex = activeBgIndex === 1 ? 2 : 1;
        }

        function switchAvatar(url) {
            const activeEl = activeAvatarIndex === 1 ? avatar1 : avatar2;
            const nextEl = activeAvatarIndex === 1 ? avatar2 : avatar1;

            if (url === "") {
                activeEl.classList.remove('active');
                nextEl.classList.remove('active');
            } else {
                nextEl.src = url;
                nextEl.classList.add('active');
                activeEl.classList.remove('active');
            }

            activeAvatarIndex = activeAvatarIndex === 1 ? 2 : 1;
        }

        function runTypewriter(text) {
            textEl.innerText = "";
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            
            let i = 0;
            const content = text.replace(/^"|"$/g, '');
            
            typeWriterTimer = setInterval(() => {
                if (i < content.length) {
                    textEl.innerText += content.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterTimer);
                }
            }, 40);
        }
    </script>
</body>
</html>
