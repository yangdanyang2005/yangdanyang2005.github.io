<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魂入华夏</title>
    <style>
        /* --- 1. 全局与字体设置 --- */
        @font-face {
            font-family: 'AncientFont';
            src: local('KaiTi'), local('STKaiti'), local('SimSun'), serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'AncientFont', serif;
            overflow: hidden;
            user-select: none;
        }

        /* --- 2. 游戏舞台 --- */
        #game-stage {
            width: 960px;
            height: 640px;
            background-color: #000;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px double #5c4033;
            overflow: hidden;
        }

        /* --- 3. 游戏内背景层 --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .bg-layer.active { opacity: 1; z-index: 2; }

        /* --- 4. 立绘层 --- */
        #character-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 440px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: scale(0.95);
            transition: opacity 0.3s;
            z-index: 5;
            pointer-events: none;
        }

        /* --- 5. 游戏内 UI 容器 (对话框) --- */
        #ui-container {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 200px;
            z-index: 10;
            display: none;
            overflow: visible;
        }

        /* --- 6. 头像组件 --- */
        #avatar-box {
            position: absolute;
            bottom: 50px; left: 10px;
            width: 220px; height: 220px;
            z-index: 100;
            pointer-events: none;
        }
        .avatar-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; object-position: bottom center;
            opacity: 0; transition: opacity 0.5s ease-in-out;
            filter: drop-shadow(5px 5px 8px rgba(0,0,0,0.6));
        }
        .avatar-layer.active { opacity: 1; }

        /* --- 7. 对话框组件 --- */
        #text-box {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1f1a1a, #110e0e);
            border-top: 4px solid #8b5a2b;
            padding: 35px 40px 35px 240px;
            box-sizing: border-box;
            color: #e0d0b0;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
        }

        #name-tag {
            font-size: 28px; font-weight: bold; color: #ffb366;
            text-shadow: 2px 2px 4px #000; margin-bottom: 15px;
            letter-spacing: 2px; display: inline-block;
            border-bottom: 2px solid #5c2020; padding-bottom: 4px;
        }

        #dialog-text {
            font-size: 22px; line-height: 1.6; letter-spacing: 1.5px;
            text-shadow: 1px 1px 2px #000;
        }

        #next-indicator {
            position: absolute; bottom: 20px; right: 30px;
            font-size: 16px; color: #8b5a2b; animation: pulse 1.5s infinite;
        }

        /* --- 8. 全屏覆盖层通用样式 --- */
        .full-screen-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; 
            z-index: 2000;
            background: #000;
        }

        .top-visual-area {
            width: 100%;
            height: 440px; 
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #000;
        }

        .bottom-text-area {
            width: 100%;
            height: 200px;
            background: linear-gradient(to bottom, #2a2020, #110e0e);
            border-top: 4px solid #8b5a2b;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e0d0b0;
            position: relative;
        }

        /* --- 特定页面样式 --- */
        #start-screen {
            cursor: default;
            transition: opacity 1s;
        }
        
        #start-content-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }

        #start-title {
            font-size: 56px;
            margin-bottom: 20px;
            color: #ffb366;
            letter-spacing: 10px;
            font-weight: bold;
            text-shadow: 0 0 10px #8b4513;
        }

        #start-info {
            font-size: 20px; color: #ccc; letter-spacing: 2px; margin-bottom: 40px;
        }

        /* 按钮通用样式 */
        .menu-btn {
            background: transparent;
            border: 2px solid #8b5a2b;
            color: #d0b090;
            padding: 10px 40px;
            font-family: 'AncientFont', serif;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
            position: relative;
            overflow: hidden;
        }
        .menu-btn:hover {
            background: rgba(139, 90, 43, 0.3);
            color: #fff;
            box-shadow: 0 0 15px #8b5a2b;
        }
        .menu-btn::before {
            content: "◆"; margin-right: 8px; font-size: 14px; opacity: 0.6;
        }

        #end-screen {
            display: none; opacity: 0; transition: opacity 2s; z-index: 1500;
        }
        #end-content {
            font-size: 22px; line-height: 1.6; margin-bottom: 20px;
            letter-spacing: 2px; text-align: center; padding: 0 40px; color: #e0e0e0;
        }

        /* --- 9. 聆听回响页面 (Echo Screen) --- */
        #echo-screen {
            display: none;
            z-index: 3000;
        }
        
        #echo-visual {
            flex: 1; /* 占据剩余空间 */
            background-size: cover;
            background-position: center;
            position: relative;
        }

        #echo-subtitle-box {
            height: 120px;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid #5c4033;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 60px;
            position: relative;
        }

        #echo-text {
            color: #fff;
            font-size: 20px;
            letter-spacing: 1.5px;
            text-shadow: 1px 1px 2px #000;
            text-align: center;
        }

        /* 回响页面的导航按钮 */
        .echo-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: #b09070;
            border: 1px solid #5c4033;
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            transition: 0.2s;
            z-index: 100;
        }
        .echo-nav-btn:hover { background: #3a2a2a; color: #fff; }
        #echo-prev { left: 20px; }
        #echo-next { right: 20px; }

        #echo-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid #8b5a2b;
            color: #d0b090;
            padding: 5px 15px;
            cursor: pointer;
            z-index: 110;
        }

        /* === 返回封面按钮样式 === */
        #home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000; /* 保证在UI层之上，但低于全屏覆盖层 */
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8b5a2b;
            color: #d0b090;
            padding: 8px 15px;
            font-family: 'AncientFont', serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: none; /* 默认隐藏，开始游戏才显示 */
        }

        #home-btn:hover {
            background: #3a2a2a;
            color: #fff;
            box-shadow: 0 0 10px #8b5a2b;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <div id="bg-layer-1" class="bg-layer active"></div>
        <div id="bg-layer-2" class="bg-layer"></div>

        <div id="character-layer"></div>

        <button id="home-btn" onclick="returnToTitle()">☖ 返回封面</button>

        <div id="ui-container">
            <div id="avatar-box">
                <img id="avatar-1" class="avatar-layer" src="" alt="">
                <img id="avatar-2" class="avatar-layer" src="" alt="">
            </div>
            
            <div id="text-box" onclick="nextStep()">
                <div id="name-tag"></div>
                <div id="dialog-text"></div>
                <div id="next-indicator">▼</div>
            </div>
        </div>

        <div id="start-screen" class="full-screen-layer">
            <div id="start-bg-layer" class="bg-layer active" style="opacity: 0.4;"></div>
            <div id="start-content-wrapper">
                <div id="start-title">加载中...</div>
                <div id="start-info"></div>
                
                <div style="margin-top: 30px;">
                    <button class="menu-btn" onclick="startGame()">开始旅程</button>
                    <button class="menu-btn" onclick="openEchoMode()">聆听回响</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="full-screen-layer">
            <div id="end-bg-layer" class="top-visual-area"></div>
            <div class="bottom-text-area">
                <div id="end-content"></div>
                <div style="margin-top: 15px;">
                    <button class="menu-btn" onclick="location.reload()">重新开始</button>
                    <button class="menu-btn" onclick="openEchoMode('end')">聆听回响</button>
                </div>
            </div>
        </div>

        <div id="echo-screen" class="full-screen-layer">
            <button id="echo-close" onclick="closeEchoMode()">✕ 返回</button>
            <div id="echo-visual">
                <button id="echo-prev" class="echo-nav-btn" onclick="changeEcho(-1)">❮</button>
                <button id="echo-next" class="echo-nav-btn" onclick="changeEcho(1)">❯</button>
            </div>
            <div id="echo-subtitle-box">
                <div id="echo-text"></div>
            </div>
        </div>
    </div>

    <audio id="bgm-player" loop></audio>

    <audio id="voice-player"></audio> <script>
        // --- 变量声明 ---
        let scriptData = [];
        let echoData = [];
        let currentIndex = -1;
        let typeWriterTimer = null;
        
        // 状态标记
        let isGameStarted = false;
        let isEchoMode = false;
        let currentEchoIndex = 0;
        let echoSource = 'start';

        // 渲染缓存
        let currentBgUrl = "";
        let activeBgIndex = 1;
        let currentAvatarUrl = "";
        let activeAvatarIndex = 1;

        // DOM 元素
        const bgLayer1 = document.getElementById('bg-layer-1');
        const bgLayer2 = document.getElementById('bg-layer-2');
        const charEl = document.getElementById('character-layer');
        const uiContainer = document.getElementById('ui-container');
        const avatar1 = document.getElementById('avatar-1');
        const avatar2 = document.getElementById('avatar-2');
        const textBoxEl = document.getElementById('text-box'); 
        const nameEl = document.getElementById('name-tag');
        const textEl = document.getElementById('dialog-text');
        
        const audioPlayer = document.getElementById('bgm-player');
        const voicePlayer = document.getElementById('voice-player');

        // 界面层
        const startScreen = document.getElementById('start-screen');
        const startBgLayer = document.getElementById('start-bg-layer'); 
        const startTitle = document.getElementById('start-title');
        const startInfo = document.getElementById('start-info');

        const endScreen = document.getElementById('end-screen');
        const endBgLayer = document.getElementById('end-bg-layer'); 
        const endContent = document.getElementById('end-content');

        // 回想层元素
        const echoScreen = document.getElementById('echo-screen');
        const echoVisual = document.getElementById('echo-visual');
        const echoText = document.getElementById('echo-text');

        // --- 1. 初始化 ---
        window.onload = function() {
            loadScript();
            loadEchoes(); // 加载回想数据
            document.addEventListener('keydown', handleKeyPress);
        }

        // --- 键盘控制逻辑 ---
        function handleKeyPress(e) {
            // 阻止方向键滚动
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) {
                e.preventDefault();
            }

            // 回想模式下的键盘控制
            if (isEchoMode) {
                if (e.key === 'Escape') closeEchoMode();
                if (e.key === 'ArrowRight') changeEcho(1);
                if (e.key === 'ArrowLeft') changeEcho(-1);
                return;
            }

            // 游戏模式控制
            const nextKeys = ['ArrowRight', 'ArrowDown', ' ', 'Enter'];
            const prevKeys = ['ArrowLeft', 'ArrowUp'];

            if (!isGameStarted) {
                // 封面状态下，回车也可以开始
                if (e.key === 'Enter') startGame();
                return;
            }

            if (nextKeys.includes(e.key)) nextStep();
            else if (prevKeys.includes(e.key)) prevStep();
        }

        // --- 数据加载 ---
        function loadScript() {
            fetch('script.csv')
                .then(res => res.ok ? res.text() : Promise.reject("script.csv 404"))
                .then(text => {
                    scriptData = parseCSV(text);
                    initCover(); 
                })
                .catch(err => {
                    console.error(err);
                    startTitle.innerText = "魂入华夏";
                    startInfo.innerText = "剧本加载失败";
                });
        }

        function loadEchoes() {
            fetch('echoes.csv')
                .then(res => res.ok ? res.text() : Promise.reject("echoes.csv 404"))
                .then(text => {
                    echoData = parseEchoCSV(text);
                })
                .catch(err => {
                    console.log("回想数据加载失败或未提供，使用空列表", err);
                    echoData = [];
                });
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                // 简单处理逗号，实际项目建议使用更强的CSV库
                const parts = line.split(','); 
                result.push({
                    type: parts[0] ? parts[0].trim() : "dialog",
                    bg: (parts[1] || "").replace(/\\/g, '/').trim(),      
                    char: (parts[2] || "").replace(/\\/g, '/').trim(),  
                    avatar: (parts[3] || "").replace(/\\/g, '/').trim(),
                    name: parts[4] || "",
                    text: parts.slice(5).join(',') || ""
                });
            }
            return result;
        }

        function parseEchoCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            // 假设 echoes.csv 格式: img, text, audio_path
            for (let i = 0; i < lines.length; i++) { // 如果有标题行请从1开始
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.split(',');
                // 跳过可能的标题行
                if (parts[0] === 'img' || parts[0] === 'image') continue;

                result.push({
                    img: (parts[0] || "").replace(/\\/g, '/').trim(),
                    text: parts[1] || "...",
                    voice: (parts[2] || "").replace(/\\/g, '/').trim()
                });
            }
            return result;
        }

        function initCover() {
            const startScene = scriptData.find(s => s.type === 'start');
            if (startScene) {
                if (startScene.bg) startBgLayer.style.backgroundImage = `url('${startScene.bg}')`;
                startTitle.innerText = startScene.name;
                startInfo.innerText = startScene.text;

                // --- 读取 BGM 并添加交互监听 ---
                // 约定 CSV 中 start 行的 char (第3列) 为 BGM 路径
                if (startScene.char && startScene.char.trim() !== "") {
                    audioPlayer.src = startScene.char;
                    audioPlayer.load(); 

                    // 定义一个触发函数：尝试播放，成功后移除监听
                    const playOnInteraction = () => {
                        initBGM();
                        // 移除监听器，确保只触发一次
                        document.removeEventListener('click', playOnInteraction);
                        document.removeEventListener('keydown', playOnInteraction);
                    };

                    // 在文档层面监听点击和按键
                    // 这样用户只要点击页面任何地方（或者按任意键），BGM 就会开始播放
                    document.addEventListener('click', playOnInteraction);
                    document.addEventListener('keydown', playOnInteraction);
                }

            } else {
                startTitle.innerText = "魂入华夏";
                startInfo.innerText = "准备就绪";
            }
        }

        // DOM 元素引用
        const homeBtn = document.getElementById('home-btn');

        // === BGM 初始化函数 ===
        // 浏览器的策略通常要求用户产生交互（点击）后才能播放音频
        function initBGM() {
            if (audioPlayer.paused) {
                audioPlayer.volume = 0.5;
                audioPlayer.play().catch(e => {
                    // 如果播放失败（比如仅仅是鼠标移动），这里不做处理，等待下一次点击
                    console.log("等待用户交互以播放BGM"); 
                });
            }
        }

        // --- 2. 游戏流程控制 ---
        function startGame() {
            if (isGameStarted) return;
            isGameStarted = true;

            // 再次尝试播放 BGM (以防用户第一次点击没触发，或者之前暂停了)
            initBGM();

            // 显示返回按钮
            homeBtn.style.display = 'block';

            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'block';
                
                // 如果是从头开始（currentIndex = -1），则定位到第一行
                // 如果是“继续游戏”逻辑（这里简化为总是重头开始），可以保持索引
                if (currentIndex === -1) {
                   currentIndex = scriptData.findIndex(s => s.type !== 'start');
                }
                
                if (currentIndex !== -1) renderSceneState(currentIndex);
            }, 1000);
        }

        function returnToTitle() {
            // 1. 停止游戏状态
            isGameStarted = false;
            
            // 2. 隐藏游戏 UI
            uiContainer.style.display = 'none';
            homeBtn.style.display = 'none';
            
            // 3. 隐藏立绘和清理头像
            charEl.style.opacity = 0;
            switchAvatar(""); // 清空头像
            
            // 4. 重置剧情索引 (这样下次点击“开始旅程”会从头开始)
            currentIndex = -1;
            
            // 5. 显示封面
            startScreen.style.display = 'flex';
            // 稍微延迟一点改变透明度以产生淡入效果
            setTimeout(() => {
                startScreen.style.opacity = 1;
                // 重置封面背景（如果封面图在 script csv 的 start 类型里定义了）
                initCover(); 
            }, 50);

            // 注意：通常返回封面不停止 BGM，让它继续放着，很有氛围感
        }

        function nextStep() {
            if (!isGameStarted) return;
            // 如果已经在结尾页了，不处理
            if (currentIndex >= 0 && scriptData[currentIndex] && scriptData[currentIndex].type === 'end') return;

            const nextIndex = currentIndex + 1;
            if (nextIndex >= scriptData.length) return;

            currentIndex = nextIndex;
            const scene = scriptData[currentIndex];

            if (scene.type === 'end') {
                showEnding(scene);
            } else if (scene.type === 'start') {
                // 如果脚本里中间混入了 start 类型，跳过
                nextStep();
            } else {
                renderSceneState(currentIndex);
            }
        }

        function prevStep() {
            if (!isGameStarted) return;
            let targetIndex = currentIndex - 1;
            while (targetIndex >= 0 && scriptData[targetIndex].type === 'start') targetIndex--; 
            
            if (targetIndex < 0) return;

            if (endScreen.style.display === 'flex') {
                endScreen.style.opacity = 0;
                setTimeout(() => { endScreen.style.display = 'none'; }, 500);
                uiContainer.style.display = 'block';
            }

            currentIndex = targetIndex;
            renderSceneState(currentIndex);
        }

        // --- 状态渲染核心 ---
        function renderSceneState(index) {
            const scene = scriptData[index];

            // 1. 背景：保持状态（如果当前行没有背景，找上一个有的）
            let effectiveBg = "";
            for (let i = index; i >= 0; i--) {
                if (scriptData[i].bg && scriptData[i].bg !== "") {
                    effectiveBg = scriptData[i].bg;
                    break;
                }
            }
            if (effectiveBg !== currentBgUrl) {
                switchBackground(effectiveBg);
                currentBgUrl = effectiveBg;
            }

            // 2. 头像：当前行有就显示，没有就隐藏
            let effectiveAvatar = scene.avatar; // 直接取当前行的 avatar
            // 如果你希望 CSV 里写 "none" 也能强制清除，可以在这里加判断

            if (effectiveAvatar !== currentAvatarUrl) {
                switchAvatar(effectiveAvatar);
                currentAvatarUrl = effectiveAvatar;
            }

            // 3. 立绘
            if (scene.char && scene.char !== "") {
                charEl.style.backgroundImage = `url('${scene.char}')`;
                charEl.style.opacity = 1;
            } else {
                charEl.style.opacity = 0;
            }

            // 4. 文本
            textBoxEl.style.opacity = "1";
            nameEl.innerText = scene.name || "";
            runTypewriter(scene.text);
        }

        function showEnding(scene) {
            uiContainer.style.display = 'none';
            homeBtn.style.display = 'none'; // 隐藏返回按钮
            charEl.style.opacity = 0;
            if (scene.bg) endBgLayer.style.backgroundImage = `url('${scene.bg}')`;
            endScreen.style.display = 'flex';
            setTimeout(() => { endScreen.style.opacity = 1; }, 50);
            endContent.innerText = scene.text;
        }

        // --- 3. 聆听回响 (Echo Mode) ---
        function openEchoMode(source = 'start') {
            if (echoData.length === 0) {
                alert("未找到回想数据 (echoes.csv)");
                return;
            }
            
            // 记录来源
            echoSource = source; 
            isEchoMode = true;
            currentEchoIndex = 0;

            // 根据来源隐藏对应的界面
            if (echoSource === 'start') {
                startScreen.style.display = 'none';
            } else if (echoSource === 'end') {
                endScreen.style.display = 'none';
            }

            echoScreen.style.display = 'flex';
            renderEcho(currentEchoIndex);
        }

        function closeEchoMode() {
            isEchoMode = false;
            voicePlayer.pause();
            echoScreen.style.display = 'none';

            // 根据之前的来源返回对应的界面
            if (echoSource === 'end') {
                endScreen.style.display = 'flex';
                // 保持结束画面的透明度为 1 (因为之前已经是显示状态)
                endScreen.style.opacity = 1; 
            } else {
                // 默认为 start
                startScreen.style.display = 'flex';
                startScreen.style.opacity = 1;
            }
        }

        function changeEcho(direction) {
            if (echoData.length === 0) return;

            let newIndex = currentEchoIndex + direction;
            const total = echoData.length;

            // --- 循环逻辑 ---
            if (newIndex < 0) {
                // 如果在第一个向左点，跳到最后一个
                newIndex = total - 1;
            } else if (newIndex >= total) {
                // 如果在最后一个向右点，跳回第一个
                newIndex = 0;
            }

            currentEchoIndex = newIndex;
            renderEcho(currentEchoIndex);
        }

        function renderEcho(index) {
            const data = echoData[index];
            
            // 设置大图
            if (data.img) {
                echoVisual.style.backgroundImage = `url('${data.img}')`;
            } else {
                echoVisual.style.backgroundImage = 'none';
            }

            // 设置字幕
            echoText.innerText = data.text;

            // 播放语音
            if (data.voice) {
                voicePlayer.src = data.voice;
                voicePlayer.play().catch(e => console.log("语音播放失败:", e));
            } else {
                voicePlayer.pause();
            }
        }

        // --- 辅助显示函数 ---
        function switchBackground(url) {
            if (!url) return; 
            const activeLayer = activeBgIndex === 1 ? bgLayer1 : bgLayer2;
            const nextLayer = activeBgIndex === 1 ? bgLayer2 : bgLayer1;

            nextLayer.style.backgroundImage = `url('${url}')`;
            nextLayer.classList.add('active');
            activeLayer.classList.remove('active');
            activeBgIndex = activeBgIndex === 1 ? 2 : 1;
        }

        function switchAvatar(url) {
            // 获取当前显示的img和隐藏的img
            const activeEl = activeAvatarIndex === 1 ? avatar1 : avatar2;
            const nextEl = activeAvatarIndex === 1 ? avatar2 : avatar1;

            // 如果 URL 为空，或者 CSV 里没填 -> 隐藏所有
            if (!url || url === "") {
                activeEl.classList.remove('active');
                nextEl.classList.remove('active');
                // 确保两个都不显示
                setTimeout(() => {
                    activeEl.src = "";
                    nextEl.src = "";
                }, 500); // 等淡出动画结束再清空src
            } else {
                // 有新头像 -> 交叉淡入淡出
                nextEl.src = url;
                nextEl.classList.add('active');
                activeEl.classList.remove('active');
            }
            // 切换索引
            activeAvatarIndex = activeAvatarIndex === 1 ? 2 : 1;
        }

        function runTypewriter(text) {
            textEl.innerText = "";
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            
            let i = 0;
            const content = text ? text.replace(/^"|"$/g, '') : "";
            
            typeWriterTimer = setInterval(() => {
                if (i < content.length) {
                    textEl.innerText += content.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterTimer);
                }
            }, 30);
        }
    </script>
</body>
