<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史剧场</title>
    <style>
        /* --- 1. 全局与字体设置 --- */
        @font-face {
            font-family: 'AncientFont';
            src: local('KaiTi'), local('STKaiti'), local('SimSun'), serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'AncientFont', serif;
            overflow: hidden;
            user-select: none;
        }

        /* --- 2. 游戏舞台 --- */
        #game-stage {
            width: 960px;
            height: 640px;
            background-color: #000;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px double #5c4033;
            overflow: hidden;
        }

        /* --- 3. 游戏内背景层 --- */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .bg-layer.active { opacity: 1; z-index: 2; }

        /* --- 4. 立绘层 --- */
        #character-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 440px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: scale(0.95);
            transition: opacity 0.3s;
            z-index: 5;
            pointer-events: none;
        }

        /* --- 5. 游戏内 UI 容器 (对话框) --- */
        #ui-container {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 200px;
            z-index: 10;
            display: none;
            overflow: visible;
        }

        /* --- 6. 头像组件 --- */
        #avatar-box {
            position: absolute;
            bottom: 50px; left: 10px;
            width: 220px; height: 220px;
            z-index: 100;
            pointer-events: none;
        }
        .avatar-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; object-position: bottom center;
            opacity: 0; transition: opacity 0.5s ease-in-out;
            filter: drop-shadow(5px 5px 8px rgba(0,0,0,0.6));
        }
        .avatar-layer.active { opacity: 1; }

        /* --- 7. 对话框组件 --- */
        #text-box {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1f1a1a, #110e0e);
            border-top: 4px solid #8b5a2b;
            padding: 35px 40px 35px 240px;
            box-sizing: border-box;
            color: #e0d0b0;
            cursor: pointer;
            pointer-events: auto;
            z-index: 10;
        }

        #name-tag {
            font-size: 28px; font-weight: bold; color: #ffb366;
            text-shadow: 2px 2px 4px #000; margin-bottom: 15px;
            letter-spacing: 2px; display: inline-block;
            border-bottom: 2px solid #5c2020; padding-bottom: 4px;
        }

        #dialog-text {
            font-size: 22px; line-height: 1.6; letter-spacing: 1.5px;
            text-shadow: 1px 1px 2px #000;
        }

        #next-indicator {
            position: absolute; bottom: 20px; right: 30px;
            font-size: 16px; color: #8b5a2b; animation: pulse 1.5s infinite;
        }

        /* --- 8. 全屏覆盖层通用样式 (Start & End Screen) --- */
        .full-screen-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; /* 垂直排列 */
            z-index: 2000;
        }

        /* 上半部分：图片区域 */
        .top-visual-area {
            width: 100%;
            height: 440px; /* 固定高度 */
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #000;
        }

        /* 下半部分：文字区域 */
        .bottom-text-area {
            width: 100%;
            height: 200px; /* 固定高度 */
            background: linear-gradient(to bottom, #2a2020, #110e0e);
            border-top: 4px solid #8b5a2b;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e0d0b0;
            position: relative;
        }

        /* --- 特定页面样式 --- */
        
        /* 开始界面 */
        #start-screen {
            cursor: pointer;
            transition: opacity 1s;
        }

        #start-title {
            font-size: 48px; /* 稍微调小以适应底部空间 */
            margin-bottom: 10px;
            color: #ffb366;
            letter-spacing: 8px;
            font-weight: bold;
            text-shadow: 2px 2px 5px #000;
        }

        #start-info {
            font-size: 20px;
            color: #ccc;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        #start-hint {
            font-size: 16px;
            color: #a58f6e;
            animation: pulse 2s infinite;
            border: 1px solid #5c4033;
            padding: 5px 15px;
            border-radius: 4px;
        }

        /* 结束界面 */
        #end-screen {
            display: none;
            opacity: 0;
            transition: opacity 2s;
            z-index: 1500;
        }

        #end-content {
            font-size: 22px;
            line-height: 1.6;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 40px;
            color: #e0e0e0;
        }

        #restart-btn {
            border: 1px solid #8b5a2b;
            background: #3a2a2a;
            color: #d0b090;
            padding: 8px 25px;
            font-family: 'AncientFont', serif;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        #restart-btn:hover { background: #5c4033; }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <div id="bg-layer-1" class="bg-layer active"></div>
        <div id="bg-layer-2" class="bg-layer"></div>

        <div id="character-layer"></div>

        <div id="ui-container">
            <div id="avatar-box">
                <img id="avatar-1" class="avatar-layer" src="" alt="">
                <img id="avatar-2" class="avatar-layer" src="" alt="">
            </div>
            
            <div id="text-box" onclick="nextStep()">
                <div id="name-tag"></div>
                <div id="dialog-text"></div>
                <div id="next-indicator">▼</div>
            </div>
        </div>

        <div id="start-screen" class="full-screen-layer" onclick="startGame()">
            <div id="start-bg-layer" class="top-visual-area"></div>
            <div class="bottom-text-area">
                <div id="start-title">加载中...</div>
                <div id="start-info"></div>
                <div id="start-hint">◆ 点击开始 ◆</div>
            </div>
        </div>

        <div id="end-screen" class="full-screen-layer">
            <div id="end-bg-layer" class="top-visual-area"></div>
            <div class="bottom-text-area">
                <div id="end-content"></div>
                <button id="restart-btn" onclick="location.reload()">重新开始</button>
            </div>
        </div>
    </div>

    <audio id="bgm-player" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- 变量声明 ---
        let scriptData = [];
        let currentIndex = -1;
        let typeWriterTimer = null;
        let isGameStarted = false;

        let currentBgUrl = "";
        let activeBgIndex = 1;
        let currentAvatarUrl = "";
        let activeAvatarIndex = 1;

        // DOM 元素获取
        const bgLayer1 = document.getElementById('bg-layer-1');
        const bgLayer2 = document.getElementById('bg-layer-2');
        const charEl = document.getElementById('character-layer');
        const uiContainer = document.getElementById('ui-container');
        const avatar1 = document.getElementById('avatar-1');
        const avatar2 = document.getElementById('avatar-2');
        const textBoxEl = document.getElementById('text-box'); 
        const nameEl = document.getElementById('name-tag');
        const textEl = document.getElementById('dialog-text');
        const audioPlayer = document.getElementById('bgm-player');

        // 开始/结束页相关元素
        const startScreen = document.getElementById('start-screen');
        const startBgLayer = document.getElementById('start-bg-layer'); // 新增
        const startTitle = document.getElementById('start-title');
        const startInfo = document.getElementById('start-info');

        const endScreen = document.getElementById('end-screen');
        const endBgLayer = document.getElementById('end-bg-layer'); // 新增
        const endContent = document.getElementById('end-content');
        
        // --- 1. 加载 CSV ---
        window.onload = function() {
            loadScript();
        }

        function loadScript() {
            fetch('script.csv')
                .then(res => {
                    if (!res.ok) throw new Error("CSV读取失败");
                    return res.text();
                })
                .then(text => {
                    scriptData = parseCSV(text);
                    initCover(); 
                })
                .catch(err => {
                    console.error(err);
                    startTitle.innerText = "错误";
                    startInfo.innerText = "未找到 script.csv";
                });
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.split(','); 
                
                const rawBg = parts[1] || "";
                const rawChar = parts[2] || "";
                const rawAvatar = parts[3] || "";

                result.push({
                    type: parts[0] ? parts[0].trim() : "dialog",
                    bg: rawBg.replace(/\\/g, '/').trim(),      
                    char: rawChar.replace(/\\/g, '/').trim(),  
                    avatar: rawAvatar.replace(/\\/g, '/').trim(),
                    name: parts[4] || "",
                    text: parts.slice(5).join(',') || ""
                });
            }
            return result;
        }

        // --- 2. 初始化封面 ---
        function initCover() {
            const startScene = scriptData.find(s => s.type === 'start');
            
            if (startScene) {
                // 修改：背景图设置在上面的 div
                if (startScene.bg) {
                    startBgLayer.style.backgroundImage = `url('${startScene.bg}')`;
                }
                startTitle.innerText = startScene.name;
                startInfo.innerText = startScene.text;
            } else {
                startTitle.innerText = "历史剧场";
                startInfo.innerText = "默认剧本";
            }
        }

        // --- 3. 开始游戏 ---
        function startGame() {
            if (isGameStarted) return;
            isGameStarted = true;

            audioPlayer.volume = 0.5;
            audioPlayer.play().catch(e => console.log("音频需交互:", e));

            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'block';
                currentIndex = scriptData.findIndex(s => s.type !== 'start') - 1;
                nextStep();
            }, 1000);
        }

        // --- 4. 推进剧情 ---
        function nextStep() {
            if (!isGameStarted) return;
            currentIndex++;
            if (currentIndex >= scriptData.length) return;

            const scene = scriptData[currentIndex];

            if (scene.type === 'end') {
                showEnding(scene);
            } else if (scene.type === 'dialog' || scene.type === '') {
                renderDialog(scene);
            } else if (scene.type === 'start') {
                nextStep();
            }
        }

        function renderDialog(scene) {
            const newBg = scene.bg;
            const newAvatar = scene.avatar;
            const newText = scene.text;

            if (newBg && newBg !== currentBgUrl) {
                switchBackground(newBg);
                currentBgUrl = newBg;
            }
            if (newAvatar !== currentAvatarUrl) {
                switchAvatar(newAvatar);
                currentAvatarUrl = newAvatar;
            }
            if (scene.char && scene.char !== "") {
                charEl.style.backgroundImage = `url('${scene.char}')`;
                charEl.style.opacity = 1;
            } else {
                charEl.style.opacity = 0;
            }

            textBoxEl.style.opacity = "1";
            uiContainer.style.display = "block"; 
            nameEl.innerText = scene.name;
            runTypewriter(newText);
        }

        // --- 5. 渲染结局 ---
        function showEnding(scene) {
            uiContainer.style.display = 'none';
            charEl.style.opacity = 0;

            // 修改：背景图设置在 endScreen 的上层 div
            if (scene.bg) {
                endBgLayer.style.backgroundImage = `url('${scene.bg}')`;
            }

            endScreen.style.display = 'flex';
            setTimeout(() => {
                endScreen.style.opacity = 1;
            }, 50);

            endContent.innerText = scene.text;
            isGameStarted = false;
        }

        // --- 辅助函数 ---
        function switchBackground(url) {
            const activeLayer = activeBgIndex === 1 ? bgLayer1 : bgLayer2;
            const nextLayer = activeBgIndex === 1 ? bgLayer2 : bgLayer1;

            nextLayer.style.backgroundImage = `url('${url}')`;
            nextLayer.classList.add('active');
            activeLayer.classList.remove('active');
            activeBgIndex = activeBgIndex === 1 ? 2 : 1;
        }

        function switchAvatar(url) {
            const activeEl = activeAvatarIndex === 1 ? avatar1 : avatar2;
            const nextEl = activeAvatarIndex === 1 ? avatar2 : avatar1;

            if (url === "") {
                activeEl.classList.remove('active');
                nextEl.classList.remove('active');
            } else {
                nextEl.src = url;
                nextEl.classList.add('active');
                activeEl.classList.remove('active');
            }
            activeAvatarIndex = activeAvatarIndex === 1 ? 2 : 1;
        }

        function runTypewriter(text) {
            textEl.innerText = "";
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            
            let i = 0;
            const content = text.replace(/^"|"$/g, '');
            
            typeWriterTimer = setInterval(() => {
                if (i < content.length) {
                    textEl.innerText += content.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterTimer);
                }
            }, 40);
        }
    </script>
</body>
</html>
