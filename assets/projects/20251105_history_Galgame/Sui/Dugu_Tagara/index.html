<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二圣临朝</title>
    <style>
        /* --- 1. 全局与字体设置 --- */
        @font-face {
            /* 尝试调用系统自带的古风字体 */
            font-family: 'AncientFont';
            src: local('KaiTi'), local('STKaiti'), local('SimSun'), serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'AncientFont', serif; /* 启用衬线体 */
            overflow: hidden;
        }

        /* --- 2. 游戏舞台 --- */
        #game-stage {
            width: 960px; /* 稍微加宽视野 */
            height: 640px;
            background-color: #000;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px double #5c4033; /* 双线古铜色边框 */
            overflow: hidden;
        }

        /* --- 3. 背景层 (双缓冲机制实现淡入淡出) --- */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0; /* 默认隐藏 */
            transition: opacity 1.5s ease-in-out; /* 淡入淡出时间 */
            z-index: 1;
        }

        .bg-layer.active {
            opacity: 1; /* 激活层显示 */
            z-index: 2;
        }

        /* --- 4. 立绘层 --- */
        #character-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: scale(0.95);
            transition: opacity 0.3s;
            z-index: 5;
        }

        /* --- 5. UI 容器 --- */
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 200px;
            pointer-events: none;
            z-index: 10;
            display: none; /* 开始前隐藏 */
        }

        /* --- 6. 头像组件 --- */
        #avatar-box {
            position: absolute;
            bottom: 25px;
            left: -10px;
            width: 170px;
            height: 170px;
            z-index: 12;
            /* 简单的相框效果 */
            border: 3px solid #5c4033;
            background: #2b2b2b;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.6);
            overflow: hidden;
            border-radius: 4px;
        }

        #avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* --- 7. 对话框组件 (古风美化) --- */
        #text-box {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 86%; 
            height: 160px;
            /* 深褐色渐变背景，模拟木质或墨色 */
            background: linear-gradient(to bottom, rgba(43, 30, 30, 0.95), rgba(20, 15, 15, 1));
            border: 2px solid #8b5a2b; /* 铜边 */
            border-left: none; /* 左边被头像盖住，去掉边框看起来融合更好 */
            padding: 25px 30px 25px 80px; /* 左padding留大点给头像 */
            box-sizing: border-box;
            color: #e0d0b0; /* 米黄色文字，比纯白更护眼、更复古 */
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 装饰性花纹 (可选) */
        #text-box::after {
            content: "";
            position: absolute;
            top: 5px; right: 5px; bottom: 5px; left: 5px;
            border: 1px solid rgba(139, 90, 43, 0.3); /* 内部细线 */
            pointer-events: none;
        }

        #name-tag {
            font-size: 26px;
            font-weight: bold;
            color: #ff4500; /* 朱砂红 */
            text-shadow: 1px 1px 2px #000;
            margin-bottom: 12px;
            letter-spacing: 2px;
            /* 模拟印章效果背景 */
            display: inline-block;
            border-bottom: 2px solid #5c2020;
            padding-bottom: 2px;
        }

        #dialog-text {
            font-size: 20px;
            line-height: 1.7;
            letter-spacing: 1px;
            font-family: 'AncientFont', serif;
        }

        #next-indicator {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 14px;
            color: #8b5a2b;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- 8. 开始遮罩层 (解决音频自动播放问题) --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            cursor: pointer;
            transition: opacity 1s;
        }
        
        #start-title {
            font-size: 48px;
            margin-bottom: 20px;
            color: #a58f6e;
            letter-spacing: 10px;
        }

        #start-hint {
            font-size: 18px;
            color: #666;
            animation: pulse 2s infinite;
        }

    </style>
</head>
<body>

    <div id="game-stage">
        <div id="bg-layer-1" class="bg-layer active"></div>
        <div id="bg-layer-2" class="bg-layer"></div>

        <div id="character-layer"></div>

        <div id="ui-container">
            <div id="avatar-box">
                <img id="avatar-img" src="" alt="Avatar">
            </div>
            
            <div id="text-box" onclick="nextStep()">
                <div id="name-tag"></div>
                <div id="dialog-text"></div>
                <div id="next-indicator">▼</div>
            </div>
        </div>

        <div id="start-screen" onclick="initGame()">
            <div id="start-title">历史剧场</div>
            <div id="start-hint">◆ 点击屏幕开启篇章 ◆</div>
        </div>
    </div>

    <audio id="bgm-player" loop>
        <source src="bgm.mp3" type="audio/mpeg">
        您的浏览器不支持音频元素。
    </audio>

    <script>
        // --- 变量声明 ---
        let scriptData = [];
        let currentIndex = -1;
        let typeWriterTimer = null;
        let currentBgUrl = ""; // 记录当前显示的背景URL
        let activeLayerIndex = 1; // 1 或 2，标记当前哪个背景层是可见的

        // DOM 元素
        const bgLayer1 = document.getElementById('bg-layer-1');
        const bgLayer2 = document.getElementById('bg-layer-2');
        const charEl = document.getElementById('character-layer');
        const avatarEl = document.getElementById('avatar-img');
        const nameEl = document.getElementById('name-tag');
        const textEl = document.getElementById('dialog-text');
        const uiContainer = document.getElementById('ui-container');
        const startScreen = document.getElementById('start-screen');
        const audioPlayer = document.getElementById('bgm-player');

        // --- 1. 初始化游戏 (用户首次点击时触发) ---
        function initGame() {
            // 播放音乐
            audioPlayer.volume = 0.5; // 设置音量 50%
            audioPlayer.play().catch(e => console.log("音频播放失败:", e));

            // 淡出遮罩层
            startScreen.style.opacity = 0;
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'block'; // 显示游戏UI
            }, 1000);

            // 开始加载剧本
            loadScript();
        }

        // --- 2. 加载 CSV ---
        function loadScript() {
            fetch('script.csv')
                .then(res => {
                    if (!res.ok) throw new Error("CSV读取失败");
                    return res.text();
                })
                .then(text => {
                    scriptData = parseCSV(text);
                    nextStep(); // 开始第一句
                })
                .catch(err => {
                    console.error(err);
                    textEl.innerText = "错误：请确保 script.csv 存在，并使用 Live Server 运行。";
                });
        }

        // CSV 解析逻辑 (保持不变)
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                // 简单的逗号分割（请确保文本内容不含英文逗号）
                const parts = line.split(',');
                result.push({
                    bg: parts[0] || "",
                    char: parts[1] || "",
                    avatar: parts[2] || "",
                    name: parts[3] || "",
                    text: parts.slice(4).join(',') || ""
                });
            }
            return result;
        }

        // --- 3. 推进剧情 ---
        function nextStep() {
            if (scriptData.length === 0) return;

            currentIndex++;
            if (currentIndex >= scriptData.length) {
                // 剧本结束处理
                if(confirm("剧情结束，是否重头开始？")) {
                    currentIndex = 0;
                } else {
                    return;
                }
            }
            renderScene(scriptData[currentIndex]);
        }

        // --- 4. 渲染场景 (包含核心的淡入淡出逻辑) ---
        function renderScene(scene) {
            const newBg = scene.bg ? scene.bg.trim() : "";

            // [逻辑] 背景淡入淡出检测
            // 如果新背景不为空，且和当前背景不一样
            if (newBg && newBg !== currentBgUrl) {
                switchBackground(newBg);
                currentBgUrl = newBg;
            }

            // 立绘更新
            if (scene.char && scene.char.trim() !== "") {
                charEl.style.backgroundImage = `url('${scene.char.trim()}')`;
                charEl.style.opacity = 1;
            } else {
                charEl.style.opacity = 0;
            }

            // 头像更新
            if (scene.avatar && scene.avatar.trim() !== "") {
                avatarEl.src = scene.avatar.trim();
                avatarEl.style.display = "block";
            } else {
                avatarEl.style.display = "none";
            }

            // 文本更新
            nameEl.innerText = scene.name;
            runTypewriter(scene.text);
        }

        // [功能] 背景切换的核心函数
        function switchBackground(url) {
            // 确定哪个是"前台"(可见)，哪个是"后台"(隐藏)
            const activeLayer = activeLayerIndex === 1 ? bgLayer1 : bgLayer2;
            const nextLayer = activeLayerIndex === 1 ? bgLayer2 : bgLayer1;

            // 1. 在后台层加载新图片
            nextLayer.style.backgroundImage = `url('${url}')`;

            // 2. 交换状态：后台变前台(fade in)，前台变后台(fade out)
            // 这里利用 CSS 的 class .active 来控制 opacity
            nextLayer.classList.add('active');
            activeLayer.classList.remove('active');

            // 3. 更新索引
            activeLayerIndex = activeLayerIndex === 1 ? 2 : 1;
        }

        // [功能] 打字机
        function runTypewriter(text) {
            textEl.innerText = "";
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            
            let i = 0;
            const content = text.replace(/^"|"$/g, ''); // 去除可能存在的首尾引号
            
            typeWriterTimer = setInterval(() => {
                if (i < content.length) {
                    textEl.innerText += content.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterTimer);
                }
            }, 40); // 打字速度
        }
    </script>
</body>
</html>
