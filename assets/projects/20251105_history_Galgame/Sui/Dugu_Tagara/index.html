<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史剧场 CSV版</title>
    <style>
        /* --- 1. 基础设置 --- */
        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #game-stage {
            width: 800px;
            height: 600px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }

        /* --- 2. 图层 (背景 & 立绘) --- */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s;
        }

        #background {
            background-size: cover;
            background-position: center;
        }

        #character {
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center bottom;
            transform: scale(0.9);
        }

        /* --- 3. UI 区域 (文字框 + 头像) --- */
        
        /* 这是一个容器，用来包裹头像和文字框，方便整体定位 */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%); /* 居中 */
            width: 90%;
            height: 180px; /* 稍微增高以容纳头像 */
            pointer-events: none; /* 让容器本身不阻挡点击，具体点击事件给文字框 */
        }

        /* 左下角头像 - 位于文字框左侧，压住背景和文字框 */
        #avatar-img {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 160px; /* 头像大小 */
            height: 160px;
            object-fit: cover; /* 保持比例填充 */
            z-index: 10; /* 层级最高：盖住文字框背景 */
            
            /* 视觉修饰：稍微加点阴影让它立体一点，或者完全去掉 */
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.5)); 
            display: none; /* 默认隐藏，有图片时才显示 */
        }

        /* 文字框 */
        #ui-box {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 85%; /* 留出左边的空间给头像 */
            height: 140px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #a58f6e;
            border-radius: 10px;
            padding: 20px 20px 20px 60px; /* 左边padding大一点，防止文字被头像边缘遮挡 */
            box-sizing: border-box;
            color: #fff;
            cursor: pointer;
            pointer-events: auto; /* 允许点击 */
            z-index: 5; /* 层级低于头像 */
        }

        #name-tag {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        #dialog-text {
            font-size: 18px;
            line-height: 1.6;
        }

        #next-indicator {
            position: absolute;
            bottom: 10px;
            right: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <div id="background" class="layer"></div>
        <div id="character" class="layer"></div>

        <div id="ui-container">
            <img id="avatar-img" src="" alt="Avatar">
            
            <div id="ui-box" onclick="nextStep()">
                <div id="name-tag">加载中...</div>
                <div id="dialog-text">正在读取 script.csv ...</div>
                <div id="next-indicator">▼</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let scriptData = [];
        let currentIndex = -1;
        let typeWriterTimer = null;

        // 获取DOM元素
        const bgEl = document.getElementById('background');
        const charEl = document.getElementById('character');
        const avatarEl = document.getElementById('avatar-img');
        const nameEl = document.getElementById('name-tag');
        const textEl = document.getElementById('dialog-text');

        // --- 核心功能 1: 读取并解析 CSV ---
        // 这里的路径 'script.csv' 是相对于 index.html 的
        fetch('script.csv')
            .then(response => {
                if (!response.ok) throw new Error("找不到 CSV 文件，请检查路径或服务器设置");
                return response.text();
            })
            .then(text => {
                scriptData = parseCSV(text);
                console.log("剧本加载成功:", scriptData);
                // 加载完成后，自动开始第一句
                nextStep(); 
            })
            .catch(err => {
                console.error(err);
                nameEl.innerText = "错误";
                textEl.innerText = "无法加载剧本。如果你是直接双击打开html文件，浏览器会拦截本地文件读取。请使用 VS Code 的 'Live Server' 插件运行。";
            });

        // 简单的 CSV 解析函数
        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const result = [];
            // 假设第一行是标题：bg,char,avatar,name,text
            // 从第二行开始遍历
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // 注意：这里使用简单的逗号分割。
                // 如果你的台词里包含英文逗号，会被错误分割。
                // 解决方法：台词里请使用中文逗号“，”，或者需要更复杂的正则解析。
                const parts = line.split(',');
                
                // 映射数据 (防止越界，使用 || "" 做保护)
                result.push({
                    bg: parts[0] || "",
                    char: parts[1] || "",
                    avatar: parts[2] || "",
                    name: parts[3] || "",
                    // 剩下的部分重新组合作为文本（防止台词里有逗号被截断一部分）
                    text: parts.slice(4).join(',') || ""
                });
            }
            return result;
        }

        // --- 核心功能 2: 游戏逻辑 ---
        function nextStep() {
            if (scriptData.length === 0) return;

            currentIndex++;

            if (currentIndex >= scriptData.length) {
                alert("剧本结束");
                currentIndex = 0; // 循环
            }

            renderScene(scriptData[currentIndex]);
        }

        function renderScene(scene) {
            // 1. 设置背景
            if (scene.bg) {
                // 清理可能带有的回车符
                const cleanBg = scene.bg.trim(); 
                bgEl.style.backgroundImage = `url('${cleanBg}')`;
            }

            // 2. 设置立绘 (中间大图)
            if (scene.char && scene.char.trim() !== "") {
                charEl.style.backgroundImage = `url('${scene.char.trim()}')`;
                charEl.style.opacity = 1;
            } else {
                charEl.style.opacity = 0;
            }

            // 3. 设置头像 (左下角小图)
            if (scene.avatar && scene.avatar.trim() !== "") {
                avatarEl.src = scene.avatar.trim();
                avatarEl.style.display = "block";
            } else {
                avatarEl.style.display = "none";
            }

            // 4. 设置名字
            nameEl.innerText = scene.name;

            // 5. 打字机效果
            textEl.innerText = "";
            if (typeWriterTimer) clearInterval(typeWriterTimer);
            
            let i = 0;
            // 去除CSV可能留下的引号 (如果你的CSV像Excel导出那样带引号)
            const content = scene.text.replace(/^"|"$/g, ''); 
            
            typeWriterTimer = setInterval(() => {
                if (i < content.length) {
                    textEl.innerText += content.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriterTimer);
                }
            }, 40);
        }
    </script>
</body>
</html>
